{% extends "campanha/base.html" %}
{% block title %}Excluir{% endblock %}

{% block content %}
<div class="bel-card" style="max-width:480px">
  <div class="bel-card-header text-danger"><i class="bi bi-trash3-fill me-2"></i>Confirmar exclusão</div>
  <div class="p-3">
    <p>Tem certeza que deseja excluir <strong>{{ object }}</strong>?</p>
    <p class="text-muted small">Esta ação não pode ser desfeita.</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger"><i class="bi bi-trash3 me-1"></i>Excluir</button>
        {% if cancel_url %}
          <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Cancelar</a>
        {% endif %}
      </div>
    </form>
  </div>
</div>
{% endblock %}
